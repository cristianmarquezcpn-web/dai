<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal DAI | ESENCIAL SRL</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        :root { --primary: #1a365d; --secondary: #2b6cb0; --success: #38a169; --warning: #dd6b20; --danger: #e53e3e; --light: #f7fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light); padding: 20px; color: #2d3748; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 550px; margin: auto; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; }
        .header h1 { color: var(--primary); font-size: 1.8rem; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .hidden { display: none; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; font-size: 0.95rem; }
        .alert-info { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
        .alert-danger { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
        .btn-doc { background: #edf2f7; color: var(--primary); border: 1px solid #e2e8f0; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        button:disabled { background: #a0aec0; cursor: not-allowed; opacity: 0.7; }
        .archivos-lista { margin-top: 25px; border-top: 2px solid #edf2f7; padding-top: 20px; }
        .link-descarga { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; margin-bottom: 8px; border-radius: 8px; text-decoration: none; color: var(--primary); font-weight: 500; border: 1px solid #e2e8f0; }
        #ticketFinal { display: none; text-align: center; background: #f0fff4; padding: 25px; border-radius: 12px; border: 2px dashed #68d391; margin-top: 20px; }
        .loader { display: none; text-align: center; margin: 10px 0; color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>✨ ESENCIAL SRL</h1>
        <p style="color: #718096; margin: 5px 0 0 0;">Portal Seguro de Gestión DAI</p>
    </div>

    <div id="bannerBienvenida" class="alert alert-info">👋 ¡Hola! Seleccioná el paciente y el mes.</div>

    <div id="alertaFecha" class="alert alert-danger hidden">⚠️ <strong>Atención:</strong> Ya pasamos el día 5. Carga de facturas deshabilitada.</div>

    <input type="text" id="busqueda" placeholder="🔍 Buscar paciente..." oninput="filtrarSelect()">
    <select id="pacienteSelector" onchange="alSeleccionarPaciente()">
        <option value="">Seleccione un paciente...</option>
    </select>
    
    <select id="mesSelector"></select>

    <textarea id="observaciones" placeholder="Observaciones (opcional)..."></textarea>

    <div style="margin-top: 20px;">
        <button class="btn-doc" onclick="abrirCloudinary('PPI')">📄 Subir PPI</button>
        <button class="btn-doc" onclick="abrirCloudinary('ACTA')">🤝 Subir Acta Acuerdo</button>
        <button class="btn-doc" onclick="abrirCloudinary('CERTIFICADO')">🏫 Subir Certificado</button>
        <hr style="border: 0; height: 1px; background: #e2e8f0; margin: 20px 0;">
        <button class="btn-primary" onclick="abrirCloudinary('ASISTENCIA')">1. Auditar y Subir Asistencia</button>
        <div id="loaderAsistencia" class="loader">⚙️ Auditando planilla...</div>
        <button id="btnFactura" class="btn-success" onclick="abrirCloudinary('FACTURA')" disabled>2. Subir Factura Final</button>
    </div>

    <div id="ticketFinal">
        <h2 style="color: var(--success); margin: 0 0 10px 0;">¡Todo Listo! 🎉</h2>
        <p>Documentos procesados correctamente.</p>
    </div>

    <div class="archivos-lista">
        <h3 style="color: var(--primary); font-size: 1.1rem;">Historial:</h3>
        <div id="listaLinks"><p style="color: #a0aec0;">Seleccioná un paciente para ver archivos.</p></div>
    </div>
</div>

<script>
    const API_BASE = "https://dominguito-san-juan.vercel.app";
    const CLOUD_NAME = "duscmxxws";

    window.onload = async () => {
        const selector = document.getElementById('mesSelector');
        const ahora = new Date();
        for(let i = 0; i < 6; i++) {
            let f = new Date(ahora.getFullYear(), ahora.getMonth() - i, 1);
            let val = f.toLocaleDateString('es-AR', { month: '2-digit', year: 'numeric' });
            selector.innerHTML += `<option value="${val}">${f.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' }).toUpperCase()}</option>`;
        }
        if (ahora.getDate() > 5) document.getElementById('alertaFecha').classList.remove('hidden');

        try {
            const res = await fetch(`${API_BASE}/api/listar-pacientes`);
            const lista = await res.json();
            lista.forEach(p => document.getElementById('pacienteSelector').innerHTML += `<option value="${p}">${p}</option>`);
        } catch(e) { console.error("Error al cargar pacientes"); }
    };

    // Widget Cloudinary (sin cambios)
    // Busca esta parte en tu script y cámbiala:
const widget = cloudinary.createUploadWidget({
    cloudName: "duscmxxws", 
    uploadPreset: "clinic_preset" 
}, (error, result) => { 
    if (error) {
        console.error("Error exacto:", error);
        return;
    }
    if (result && result.event === "success") {
        manejarSubida(window.currentDocType, result.info.secure_url); 
    }
});
    function abrirCloudinary(tipo) {
        const p = document.getElementById('pacienteSelector').value;
        if(!p) return alert("Seleccioná un paciente primero.");
        window.currentDocType = tipo;
        widget.open();
    }
async function manejarSubida(tipo, url) {
    const p = document.getElementById('pacienteSelector').value;
    const m = document.getElementById('mesSelector').value;
    const o = document.getElementById('observaciones').value;

    if (tipo === 'ASISTENCIA') {
        document.getElementById('loaderAsistencia').style.display = 'block';

        try {
            // CAMBIA ESTO
           const res = await fetch(`${API_BASE}/api/auditor_dai`, { // <--- GUION BAJO
           method: 'POST',
           headers: {'Content-Type': 'application/json'},
           body: JSON.stringify({ url_asistencia: url, mes_esperado: m })
    });
            const data = await res.json();
            document.getElementById('loaderAsistencia').style.display = 'none';

            if (data.aprobado) {
                alert("✨ ¡Asistencia impecable!");
                await guardarEnDB(tipo, url, p, m, o);
                document.getElementById('btnFactura').disabled = false;
                await alSeleccionarPaciente();
            } else {
                const msg = data.errores ? data.errores.join("\n") : "Error de procesamiento";
                alert("❌ Errores:\n" + msg);
            }
        } catch (err) {
            document.getElementById('loaderAsistencia').style.display = 'none';
            alert("Error al conectar con el auditor: " + err.message);
        }
    } else {
        await guardarEnDB(tipo, url, p, m, o);
        if (tipo === 'FACTURA') document.getElementById('ticketFinal').style.display = 'block';
        else alert(`✅ ${tipo} guardado.`);
        await alSeleccionarPaciente();
    }
}

    async function guardarEnDB(tipo, url, paciente, mes, obs) {
        await fetch(`${API_BASE}/api/guardar_archivo`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tipo, url, paciente, mes, observaciones: obs})
        });
    }
    async function alSeleccionarPaciente() {
    const p = document.getElementById('pacienteSelector').value;
    if(!p) return;
    
    const res = await fetch(`${API_BASE}/api/listar-archivos/${encodeURIComponent(p)}?t=${Date.now()}`);
    const arch = await res.json(); 
    
    const lista = document.getElementById('listaLinks');
    lista.innerHTML = '';
    
    const ignorar = ['DETALLE', 'CUIT', 'EXENTO', 'FACTURADO', 'FACTURADO_SAEI', 'ULTIMA_FACTURA', 'IGNORAR_FACTURA', 'PRES', 'TOTAL'];
    
    for (const key in arch) {
        if(key.startsWith('OBSERVACIONES') || ignorar.includes(key.toUpperCase())) continue;
        
        const valor = arch[key];
        
        // --- LÓGICA DE DIBUJO ---
        if (typeof valor === 'string' && valor.startsWith('http')) {
            // Caso A: Es una URL directa (formato antiguo)
            renderizarLink(key, valor);
        } 
        else if (typeof valor === 'object' && valor !== null) {
            // Caso B: Es un objeto (formato nuevo, como ASISTENCIA_4 -> 2026)
            for (const subKey in valor) {
                const subValor = valor[subKey];
                if (typeof subValor === 'string' && subValor.startsWith('http')) {
                    renderizarLink(`${key} | ${subKey}`, subValor);
                }
            }
        }
    }
        
    if (lista.innerHTML === '') {
        lista.innerHTML = '<p style="color: #a0aec0;">No hay documentos registrados para este paciente.</p>';
    }
}

// Función auxiliar para no repetir código
function renderizarLink(nombre, url) {
    const lista = document.getElementById('listaLinks');
    const displayNombre = nombre.replace(/_/g, ' | ').toUpperCase();
    lista.innerHTML += `
        <a href="${url}" target="_blank" rel="noopener noreferrer" class="link-descarga">
            <span>📄 ${displayNombre}</span>
            <span>⬇️</span>
        </a>`;
}
    
    function filtrarSelect() {
        const t = document.getElementById('busqueda').value.toLowerCase();
        const op = document.getElementById('pacienteSelector').options;
        for(let i=1; i < op.length; i++) op[i].style.display = op[i].text.toLowerCase().includes(t) ? '' : 'none';
    }

</script>
</body>
</html>
